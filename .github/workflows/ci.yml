name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pipeline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Abhängigkeiten
        run: pip install -r requirements-pipeline.txt
      - name: Tests (Label-Logik §4.3)
        run: python -m pytest pipeline/tests -q
      - name: Pipeline end-to-end (synthetisch) + Inferenz-Check
        run: |
          python -m pipeline.run_pipeline --source synth
          python -m pipeline.verify_inference

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Build (Typecheck + Next)
        working-directory: web
        run: npm run build
