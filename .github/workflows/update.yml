name: Datenpipeline aktualisieren

# NFR-1: neue Feste automatisch < 24 h. Geplanter Lauf (kostenlos, §8).
on:
  schedule:
    - cron: "0 4 * * *" # täglich 04:00 UTC
  workflow_dispatch:
    inputs:
      source:
        description: "Datenquelle"
        type: choice
        options: ["synth", "scrape"]
        default: "scrape"
      voller_refetch:
        description: "Volle Historie neu laden statt nur letzte 7 Tage (zum Cache-Aufbau/-Reparieren)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-pipeline.txt

      # artifacts/raw wird NICHT committet (zu gross fürs Repo, s. .gitignore),
      # muss also über Runs hinweg gecacht werden -- sonst sieht jeder
      # Cron-Lauf nur das enge --seit-datum-Fenster von heute statt der vollen
      # Historie (fetch_raw's merge_*_raw_json ist genau dafür gebaut, NFR-1).
      # Eindeutiger Save-Key + Praefix-Restore = "immer wachsender" Cache.
      - name: Rohdaten-Cache laden
        if: ${{ github.event.inputs.source != 'synth' }}
        uses: actions/cache/restore@v4
        with:
          path: artifacts/raw
          key: rohdaten-${{ github.run_id }}
          restore-keys: |
            rohdaten-

      - name: Rohdaten holen (Porträts, ESV, abgeschlossene Feste)
        if: ${{ github.event.inputs.source != 'synth' }}
        run: |
          if [ "${{ github.event.inputs.voller_refetch }}" = "true" ]; then
            python -m pipeline.fetch_raw --sources schlussgang esv events \
              --materialize-schwinger --seit-datum "2023-01-01" --event-limit 1000
          else
            SEIT=$(date -u -d '7 days ago' +%Y-%m-%d)
            python -m pipeline.fetch_raw --sources schlussgang esv events \
              --materialize-schwinger --seit-datum "$SEIT" --event-limit 300
          fi

      - name: Rohdaten-Cache speichern
        if: ${{ github.event.inputs.source != 'synth' && !cancelled() }}
        uses: actions/cache/save@v4
        with:
          path: artifacts/raw
          key: rohdaten-${{ github.run_id }}

      - name: Pipeline ausführen
        run: python -m pipeline.run_pipeline --source ${{ github.event.inputs.source || 'scrape' }}

      - name: Artefakte committen (falls geändert)
        run: |
          git config user.name "schwingen-ml-bot"
          git config user.email "actions@github.com"
          git add artifacts/ web/public/data/
          if git diff --staged --quiet; then
            echo "Keine Änderungen an Artefakten."
          else
            git commit -m "chore: Artefakte automatisch aktualisiert ($(date -u +%Y-%m-%d))"
            git push
          fi
    # Vercel deployt automatisch bei neuem Commit (§7).
