name: Datenpipeline aktualisieren

# NFR-1: neue Feste automatisch < 24 h. Geplanter Lauf (kostenlos, §8).
on:
  schedule:
    - cron: "0 4 * * *" # täglich 04:00 UTC
  workflow_dispatch:
    inputs:
      source:
        description: "Datenquelle"
        type: choice
        options: ["synth", "scrape"]
        default: "synth"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-pipeline.txt

      - name: Pipeline ausführen
        run: python -m pipeline.run_pipeline --source ${{ github.event.inputs.source || 'synth' }}

      - name: Artefakte committen (falls geändert)
        run: |
          git config user.name "schwingen-ml-bot"
          git config user.email "actions@github.com"
          git add artifacts/ web/public/data/
          if git diff --staged --quiet; then
            echo "Keine Änderungen an Artefakten."
          else
            git commit -m "chore: Artefakte automatisch aktualisiert ($(date -u +%Y-%m-%d))"
            git push
          fi
    # Vercel deployt automatisch bei neuem Commit (§7).
